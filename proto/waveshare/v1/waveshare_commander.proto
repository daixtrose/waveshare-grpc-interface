// waveshare_commander.proto
//
// Bidirectional-streaming gRPC service for the Waveshare Modbus Commander.
//
// Transport: HTTP/2 with mutual TLS 1.3 (server + client certificates).
//
// Message envelope follows the ReactiveX Observable contract
// (https://reactivex.io/documentation/contract.html):
//
//   - Each request_id represents a logical observable.
//   - Per request_id: zero or more Next, then exactly one terminal
//     Completed or Error.
//   - Client and Server envelopes are symmetric.
//
// Usage pattern:
//   1. Client opens the bidi stream  Session(stream ClientMessage)
//      returns (stream ServerMessage).
//   2. Client sends a ClientNext(ConnectRequest) to establish the
//      Modbus TCP link.  Server replies with ServerNext(ConnectResponse)
//      then ServerCompleted for that request_id.
//   3. Client sends command messages as ClientNext; each carries a
//      request_id chosen by the client so that responses can be
//      correlated (replies are asynchronous — the server may interleave
//      responses from different requests).
//   4. For streaming operations (ITERATE_RELAY_SWITCHES, SCAN_NETWORK,
//      MONITOR_DIGITAL_INPUTS) the server sends multiple ServerNext
//      messages with the same request_id.  The client sends
//      ClientCompleted to dispose the subscription (= cancel).
//   5. Either side can close the gRPC stream at any time.
//   6. Optionally, the client opens a DebugChannel stream for
//      asynchronous debug/log output with runtime control.

syntax = "proto3";

package waveshare.v1;

option java_multiple_files = true;
option java_package        = "com.waveshare.commander.v1";
option java_outer_classname = "WaveshareCommanderProto";

// ═══════════════════════════════════════════════════════════════════
// Service
// ═══════════════════════════════════════════════════════════════════

service WaveshareCommander {
  // Single bidirectional stream that multiplexes all commands.
  rpc Session(stream ClientMessage) returns (stream ServerMessage);

  // Asynchronous debug/log channel.  Client can subscribe and
  // dynamically control log levels and filters at runtime.
  // Correlated with a Session via session_id.
  // Same Rx envelope pattern as Session: Next / Completed / Error.
  rpc DebugChannel(stream DebugClientMessage) returns (stream DebugServerMessage);
}

// ═══════════════════════════════════════════════════════════════════
// Layer 1: Rx transport envelope (domain-agnostic)
//
// Maps 1:1 to the ReactiveX Observable contract per request_id:
//   onNext(T)     → ServerNext / ClientNext
//   onCompleted() → ServerCompleted / ClientCompleted
//   onError(E)    → ServerError / ClientError
// ═══════════════════════════════════════════════════════════════════

// ── Client → Server ─────────────────────────────────────────────

message ClientMessage {
  oneof kind {
    ClientNext      next      = 1;
    ClientCompleted completed = 2;
    ClientError     error     = 3;
  }
}

// ── Server → Client ─────────────────────────────────────────────

message ServerMessage {
  oneof kind {
    ServerNext      next      = 1;
    ServerCompleted completed = 2;
    ServerError     error     = 3;
  }
}

// ═══════════════════════════════════════════════════════════════════
// Layer 2: Domain payload (inside Next / Error messages)
// ═══════════════════════════════════════════════════════════════════

// ── ClientNext: carries a domain command ────────────────────────

message ClientNext {
  // Caller-chosen correlation id (echoed in every ServerMessage that
  // belongs to this request).  Must be unique per in-flight request.
  string request_id = 1;

  oneof command {
    // ── Connection management ────────────────────────────────────
    ConnectRequest            connect              = 10;
    DisconnectRequest         disconnect            = 11;

    // ── Coil operations  (Modbus FC 01 / FC 05 / FC 15) ────────
    ReadCoilRequest           read_coil             = 20;
    ReadCoilsRequest          read_coils            = 21;
    WriteCoilRequest          write_coil            = 22;
    WriteCoilsRequest         write_coils           = 23;

    // ── Register operations  (Modbus FC 03 / FC 06 / FC 16) ────
    ReadRegisterRequest       read_register         = 30;
    ReadRegistersRequest      read_registers        = 31;
    WriteRegisterRequest      write_register        = 32;
    WriteRegistersRequest     write_registers       = 33;

    // ── Digital inputs  (Modbus FC 02) ──────────────────────────
    ReadDigitalInputsRequest  read_digital_inputs   = 40;

    // ── Relay convenience ───────────────────────────────────────
    IterateRelaySwitchesRequest iterate_relay_switches = 50;

    // ── Network discovery  (VirCom UDP) ─────────────────────────
    ScanNetworkRequest        scan_network          = 60;

    // ── Device configuration  (VirCom UDP) ──────────────────────
    SetStaticIpRequest        set_static_ip         = 70;
    SetDhcpRequest            set_dhcp              = 71;
    SetModbusTcpRequest       set_modbus_tcp        = 72;
    SetModbusTcpPortRequest   set_modbus_tcp_port   = 73;
    SetNameRequest            set_name              = 74;
  }
}

// ── ClientCompleted: dispose a subscription (= cancel) ──────────
// Replaces CancelRequest.  Signals that the client is no longer
// interested in receiving responses for this request_id.

message ClientCompleted {
  string request_id = 1;
}

// ── ClientError: client-side error for a request ────────────────

message ClientError {
  string request_id = 1;
  string message    = 2;
}

// ── ServerNext: carries a domain response ───────────────────────

message ServerNext {
  // Echoed from the ClientNext that triggered this response.
  string request_id = 1;

  oneof response {
    // ── Connection management ────────────────────────────────────
    ConnectResponse            connect              = 10;
    DisconnectResponse         disconnect            = 11;

    // ── Coil results ────────────────────────────────────────────
    CoilState                  coil_state            = 20;
    CoilStates                 coil_states           = 21;
    WriteResult                write_result          = 22;

    // ── Register results ────────────────────────────────────────
    RegisterValue              register_value        = 30;
    RegisterValues             register_values       = 31;

    // ── Digital input results ───────────────────────────────────
    DigitalInputsState         digital_inputs_state  = 40;

    // ── Relay iterate events ────────────────────────────────────
    RelayEvent                 relay_event           = 50;

    // ── Network scan results ────────────────────────────────────
    DeviceInfo                 device_info           = 60;
    ScanComplete               scan_complete         = 61;

    // ── Device configuration results ────────────────────────────
    ConfigResult               config_result         = 70;
    DeviceReappeared           device_reappeared     = 71;

    // ── Cancellation acknowledgement ────────────────────────────
    CancelAck                  cancel_ack            = 90;
  }
}

// ── ServerCompleted: stream done for a request_id ───────────────
// Pure onCompleted() — no payload beyond correlation.

message ServerCompleted {
  string request_id = 1;
}

// ── ServerError: terminal error for a request_id ────────────────

message ServerError {
  string request_id = 1;
  ErrorResponse error = 2;
}

// ═══════════════════════════════════════════════════════════════════
// Debug channel — Rx envelope (same pattern as Session)
//
// The debug channel is a separate bidi stream correlated with a
// Session via session_id.  It follows the same Rx contract:
//   onNext(T)     → DebugClientNext / DebugServerNext
//   onCompleted() → DebugClientCompleted / DebugServerCompleted
//   onError(E)    → DebugClientError / DebugServerError
// ═══════════════════════════════════════════════════════════════════

// ── Client → Server (debug) ─────────────────────────────────────

message DebugClientMessage {
  oneof kind {
    DebugClientNext      next      = 1;
    DebugClientCompleted completed = 2;
    DebugClientError     error     = 3;
  }
}

message DebugClientNext {
  // The session to observe.  Must match a currently open Session stream.
  // If empty, subscribes to server-wide debug output.
  string session_id = 1;

  oneof control {
    DebugSubscribe subscribe  = 10;
    SetLogLevel    set_level  = 11;
    SetDebugFilter set_filter = 12;
  }
}

// Dispose the debug subscription (replaces DebugUnsubscribe).
message DebugClientCompleted {
  string session_id = 1;
}

message DebugClientError {
  string session_id = 1;
  string message    = 2;
}

// ── Server → Client (debug) ─────────────────────────────────────

message DebugServerMessage {
  oneof kind {
    DebugServerNext      next      = 1;
    DebugServerCompleted completed = 2;
    DebugServerError     error     = 3;
  }
}

message DebugServerNext {
  // The session this message belongs to (or empty for server-wide).
  string session_id = 1;

  // Timestamp in RFC 3339 format (e.g. "2026-03-16T14:30:00.123Z").
  string timestamp = 2;

  LogLevel level = 3;

  // Hierarchical category (e.g. "modbus.wire", "grpc.transport",
  // "session.lifecycle").
  string category = 4;

  // Human-readable log message.
  string message = 5;

  // Optional structured key-value context (e.g. request_id, address).
  map<string, string> metadata = 6;
}

message DebugServerCompleted {
  string session_id = 1;
}

message DebugServerError {
  string session_id = 1;
  string message    = 2;
}

// ── Debug control payloads ──────────────────────────────────────
//
// The client doesn't start receiving debug output just by opening the
// DebugChannel stream.  Opening the stream only sets up the gRPC bidi
// connection — no log messages flow until the client explicitly opts in.
//
// Typical lifecycle:
//   1. Client opens DebugChannel bidi stream.
//   2. Client sends DebugSubscribe (inside a DebugClientNext) to start
//      receiving log messages at or above the specified min_level.
//   3. At any time the client can adjust filtering:
//      - SetLogLevel   → change the minimum severity threshold
//      - SetDebugFilter → include/exclude specific categories
//   4. Client sends DebugClientCompleted to unsubscribe and stop
//      receiving debug output, without closing the gRPC stream.
//   5. The client may re-subscribe later on the same stream by
//      sending a new DebugSubscribe message.
//
// This opt-in design gives the client full runtime control over debug
// output without reconnecting, and avoids flooding an unprepared client
// with log messages it hasn't asked for.

message DebugSubscribe {
  LogLevel min_level = 1;  // minimum severity to receive (default: INFO)
}

message SetLogLevel {
  LogLevel level = 1;
}

message SetDebugFilter {
  // Only emit messages matching these categories (empty = all).
  repeated string include_categories = 1;
  // Exclude messages matching these categories.
  repeated string exclude_categories = 2;
}

enum LogLevel {
  TRACE = 0;
  DEBUG = 1;
  INFO  = 2;
  WARN  = 3;
  ERROR = 4;
}

// ═══════════════════════════════════════════════════════════════════
// Connection management     (maps to CLI:  -i  -p  -t)
// ═══════════════════════════════════════════════════════════════════

message ConnectRequest {
  string ip_address      = 1;  // default "192.168.1.2"
  uint32 port            = 2;  // default 502
  uint32 timeout_seconds = 3;  // default 3
  bool   debug           = 4;  // maps to --debug
}

message ConnectResponse {
  // server-assigned, used to correlate DebugChannel
  string session_id = 1;
}

message DisconnectRequest {}
message DisconnectResponse {}

// ═══════════════════════════════════════════════════════════════════
// Device targeting     (maps to CLI:  --mac  --name  -i)
// Used by VirCom configuration commands that need to identify a
// specific device on the network.
// ═══════════════════════════════════════════════════════════════════

message DeviceTarget {
  oneof kind {
    string mac_address  = 1;  // e.g. "28:80:ca:ea:41:f3"
    string device_name  = 2;  // e.g. "Hero 1"
    string ip_address   = 3;  // e.g. "192.168.178.69"
  }

  // How long to wait for the device to reappear after a config change
  // (maps to --wait-timeout, default 30000 ms).
  uint32 wait_timeout_ms = 10;

  // Additional /24 subnets to sweep with unicast probes
  // (e.g. ["192.168.1.0"] for a directly attached network).
  repeated string extra_subnets = 11;
}

// ═══════════════════════════════════════════════════════════════════
// Coil operations
// ═══════════════════════════════════════════════════════════════════

// --read-coil <address>
message ReadCoilRequest {
  uint32 address = 1;
}

// --read-coils <address> <count>
message ReadCoilsRequest {
  uint32 address = 1;
  uint32 count   = 2;
}

// --write-coil <address> <state>
message WriteCoilRequest {
  uint32 address = 1;
  bool   state   = 2;
}

// --write-coils <addr1 state1 addr2 state2 ...>
message WriteCoilsRequest {
  repeated CoilAssignment assignments = 1;
}

message CoilAssignment {
  uint32 address = 1;
  bool   state   = 2;
}

// ── Coil responses ──────────────────────────────────────────────

message CoilState {
  uint32 address = 1;
  bool   state   = 2;
}

message CoilStates {
  uint32         start_address = 1;
  repeated bool  states        = 2;
}

// ═══════════════════════════════════════════════════════════════════
// Register operations
// ═══════════════════════════════════════════════════════════════════

// --read-register <address>
message ReadRegisterRequest {
  uint32 address = 1;
}

// --read-registers <address> <count>
message ReadRegistersRequest {
  uint32 address = 1;
  uint32 count   = 2;
}

// --write-register <address> <value>
message WriteRegisterRequest {
  uint32 address = 1;
  uint32 value   = 2;  // uint16 on the wire, uint32 in proto3
}

// --write-registers <address> <value1 value2 ...>
message WriteRegistersRequest {
  uint32          address = 1;
  repeated uint32 values  = 2;
}

// ── Register responses ──────────────────────────────────────────

message RegisterValue {
  uint32 address = 1;
  uint32 value   = 2;
}

message RegisterValues {
  uint32          start_address = 1;
  repeated uint32 values        = 2;
}

// ═══════════════════════════════════════════════════════════════════
// Digital inputs     (Modbus FC 02)
// ═══════════════════════════════════════════════════════════════════

// --read-digital-inputs  (no arguments, reads DI1-DI8)
message ReadDigitalInputsRequest {}

message DigitalInputsState {
  // Index 0 = DI1, index 7 = DI8.
  repeated bool states = 1;
}

// ═══════════════════════════════════════════════════════════════════
// Relay convenience     (streaming, cancellable)
// ═══════════════════════════════════════════════════════════════════

// --iterate-relais-switches
// Server streams RelayEvent messages until the client sends
// ClientCompleted with the matching request_id.
message IterateRelaySwitchesRequest {}

message RelayEvent {
  enum EventType {
    ALL_OFF        = 0;
    COIL_ON        = 1;
    COIL_OFF       = 2;
    CYCLE_COMPLETE = 3;
    SAFE_SHUTDOWN  = 4;
  }
  EventType type    = 1;
  uint32    coil_nr = 2;  // 1-8, meaningful for COIL_ON / COIL_OFF
}

// ═══════════════════════════════════════════════════════════════════
// Network discovery     (VirCom UDP, streaming, cancellable)
// ═══════════════════════════════════════════════════════════════════

// --scan-network [--scan-timeout T] [-i specific_ip]
message ScanNetworkRequest {
  uint32 scan_timeout_ms = 1;  // default 3000
  string probe_ip        = 2;  // optional: probe a single IP

  // Additional /24 subnets to sweep with unicast probes
  // (e.g. ["192.168.1.0"] for a directly attached network).
  repeated string extra_subnets = 3;
}

message DeviceInfo {
  string ip_address   = 1;
  string mac_address  = 2;
  string device_name  = 3;
  uint32 port         = 4;
  string subnet_mask  = 5;
  string gateway      = 6;
  string ip_mode      = 7;  // "DHCP" | "Static"
  string module_id    = 8;
}

message ScanComplete {
  uint32 devices_found = 1;
}

// ═══════════════════════════════════════════════════════════════════
// Device configuration     (VirCom UDP)
// Each config command may produce:
//   1. ConfigResult   (command accepted / sent to device)
//   2. DeviceReappeared  (device rebooted and came back)
// ═══════════════════════════════════════════════════════════════════

// --set-ip <ip> <mask> <gateway> <dns>
message SetStaticIpRequest {
  DeviceTarget target      = 1;
  string       ip_address  = 2;
  string       subnet_mask = 3;
  string       gateway     = 4;
  string       dns         = 5;
}

// --set-dhcp
message SetDhcpRequest {
  DeviceTarget target = 1;
}

// --set-modbus-tcp [--modbus-tcp-port P]
message SetModbusTcpRequest {
  DeviceTarget target = 1;
  uint32       port   = 2;  // default 502
}

// --set-modbus-tcp-port <port>
message SetModbusTcpPortRequest {
  DeviceTarget target = 1;
  uint32       port   = 2;
}

// --set-name <name>
message SetNameRequest {
  DeviceTarget target = 1;
  string       name   = 2;  // max 9 ASCII characters
}

// ── Config responses ────────────────────────────────────────────

message ConfigResult {
  string description = 1;  // human-readable summary of what was sent
}

message DeviceReappeared {
  DeviceInfo device = 1;
}

// ═══════════════════════════════════════════════════════════════════
// Write result     (shared by coil and register write commands)
// ═══════════════════════════════════════════════════════════════════

message WriteResult {
  string description = 1;
}

// ═══════════════════════════════════════════════════════════════════
// Cancellation acknowledgement
// ═══════════════════════════════════════════════════════════════════

// Sent as a ServerNext payload after the server receives
// ClientCompleted for a streaming request.  Followed by
// ServerCompleted once the server has finished cleanup.
message CancelAck {
  string cancelled_request_id = 1;
}

// ═══════════════════════════════════════════════════════════════════
// Error
// ═══════════════════════════════════════════════════════════════════

message ErrorResponse {
  enum ErrorCode {
    UNKNOWN            = 0;
    NOT_CONNECTED      = 1;
    CONNECTION_FAILED  = 2;
    MODBUS_ERROR       = 3;
    INVALID_ARGUMENT   = 4;
    DEVICE_NOT_FOUND   = 5;
    TIMEOUT            = 6;
    NAME_TOO_LONG      = 7;
  }
  ErrorCode code    = 1;
  string    message = 2;
}
